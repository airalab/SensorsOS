services:
  mongodb:
    container_name: roseman-mongodb
    image: mongo:${MONGO_VERSION:-8}
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-restore:
    container_name: roseman-mongo-restore
    image: mongo:${MONGO_VERSION:-8}
    restart: "no"
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
    volumes:
      - ./dump:/dump:ro
      - ./scripts/restore.sh:/scripts/restore.sh:ro
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: ["sh", "/scripts/restore.sh"]
    networks:
      - app-network

  rest-api:
    container_name: roseman-rest-api
    image: ghcr.io/falconexe/roseman:docker
    restart: unless-stopped
    environment:
      NODE_ENV: production
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      mongo-restore:
        condition: service_completed_successfully
    networks:
      - app-network

  indexer-polkadot:
    container_name: roseman-indexer-polkadot
    image: ghcr.io/falconexe/roseman:docker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DOTENV_CONFIG_PATH: /app/.env.polkadot
    volumes:
      - ./.env:/app/.env:ro
      - ./.env.polkadot:/app/.env.polkadot:ro
    depends_on:
      mongo-restore:
        condition: service_completed_successfully
    networks:
      - app-network

volumes:
  mongodb-data:

networks:
  app-network:
    driver: bridge
